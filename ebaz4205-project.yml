header:
  version: 14

machine: ebaz4205-zynq7
distro: nodistro

target:
  - core-image-minimal

repos:
  poky:
    url: "https://git.yoctoproject.org/poky"
    refspec: "scarthgap"
    layers:
      meta:
      meta-poky:

  meta-arm:
    url: "https://git.yoctoproject.org/meta-arm"
    refspec: "scarthgap"
    layers:
      meta-arm:
      meta-arm-toolchain:

  meta-oe:
    url: "https://git.openembedded.org/meta-openembedded"
    refspec: "scarthgap"
    layers:
      meta-oe:

  meta-xilinx:
    url: "https://github.com/Xilinx/meta-xilinx.git"
    refspec: "rel-v2026.1"
    layers:
      meta-xilinx-core:
      meta-xilinx-bsp:
      meta-xilinx-vendor:

  meta-ebaz4205:
    url: "https://github.com/ryanatseolaudio/meta-ebaz4205.git"
    refspec: "scarthgap"
    layers:
      meta-ebaz4205:

local_conf_header:
  ebaz_overrides: |
    # 1. Forcefully disable multiconfig setup
    BBMULTICONFIG = ""
    BBMULTICONFIG:forcevariable = ""

    # 2. Mask broken upstream recipes
    BBMASK += "meta-xilinx-core/recipes-bsp/u-boot/u-boot-xlnx-uenv.bb"
    BBMASK += "meta-xilinx-core/recipes-bsp/fsbl/fsbl_%.bb"

    # 3. Provider Preferences
    PREFERRED_PROVIDER_virtual/bootloader = "u-boot-xlnx"
    PREFERRED_PROVIDER_u-boot = "u-boot-xlnx"
    PREFERRED_PROVIDER_u-boot-tools = "u-boot-xlnx-tools"
    PREFERRED_PROVIDER_virtual/fsbl = ""

    # Pull in bash or whitelist shell dependencies for xz
    VIRTUAL-RUNTIME_bash = "bash"

    # Ignore file-rdeps QA check specifically for xz
    INSANE_SKIP:xz += "file-rdeps"

  licenses: |
    LICENSE_FLAGS_ACCEPTED += "xilinx"

  disk_space_management: |
    INHERIT += "rm_work"
    RM_WORK_EXCLUDE += "u-boot-xlnx"
