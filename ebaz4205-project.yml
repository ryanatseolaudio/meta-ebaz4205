header:
  version: 14

machine: ebaz4205-zynq7
distro: poky

# Make sure "mc:fsbl:zynq-fsbl" is not present here!
target:
  - core-image-minimal
  - mc:fsbl-fw:fsbl-firmware

local_conf_header:
  multiconfig: |
    BBMULTICONFIG = "fsbl-fw"
    MCTARGET_fsbl-fw = "ebaz4205-zynq7"

repos:
  poky:
    url: "https://git.yoctoproject.org/poky"
    refspec: "scarthgap"
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-arm:
    url: "https://git.yoctoproject.org/meta-arm"
    refspec: "scarthgap"
    layers:
      meta-arm:
      meta-arm-toolchain:

  meta-oe:
    url: "https://git.openembedded.org/meta-openembedded"
    refspec: "scarthgap"
    layers:
      meta-oe:

  meta-xilinx:
    url: "https://github.com/Xilinx/meta-xilinx.git"
    refspec: "rel-v2026.1"
    layers:
      meta-xilinx-core:
      meta-xilinx-vendor:
      meta-xilinx-standalone:

  meta-ebaz4205:
    url: "https://github.com/ryanatseolaudio/meta-ebaz4205.git"
    refspec: "scarthgap"
    layers:
      meta-ebaz4205:

local_conf_header:
  licenses: |
    # Accept the Xilinx license to silence the PMU-ROM QEMU warnings
    LICENSE_FLAGS_ACCEPTED += "xilinx"
    #    XILINX_WITH_ESW += "0"

  disk-space-management: |
    INHERIT += "rm_work"
