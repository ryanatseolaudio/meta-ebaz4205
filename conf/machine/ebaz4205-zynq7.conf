#@TYPE: Machine
#@NAME: ebaz4205-zynq7
#@DESCRIPTION: Machine support for the EBAZ4205 Zynq-7010 board.

require conf/machine/zynq-generic.conf

# Hardware specs
STAGING_KERNEL_DIR ?= "${TMPDIR}/work-shared/${MACHINE}/kernel-source"

# U-Boot Configurations
UBOOT_MACHINE = "xilinx_zynq_virt_defconfig"
UBOOT_EXTRA_ENV = "board=ebaz4205"

# Device Tree
KERNEL_DEVICETREE = "ebaz4205.dtb"

# 1. Disable all Xilinx bootbin recipe hooks that require the multiconfig FSBL
do_image[mcdepends] = ""
FSBL_MCDEPENDS = ""
FSBL_DEPENDS = ""

# 2. Tell the system we are using U-Boot SPL instead of FSBL
SPL_BINARY = "spl/u-boot-spl.bin"

# 3. Adjust bootbin generation variables to package SPL instead of fsbl-firmware
BIF_PARTITION_IMAGE[fsbl] = "${DEPLOY_DIR_IMAGE}/u-boot-spl.bin"

# 4. Completely decouple bitstream variables from the BIF attributes
BIF_PARTITION_ATTR = "fsbl u-boot"

# 5. Force Bitbake to ignore the virtual/bitstream dependency
# This overrides the dynamic replacement code in xilinx-bootbin.bb
DEPENDS:pn-xilinx-bootbin:remove = "virtual/bitstream"

# 6. Explicitly tell the bitstream recipe provider that we are empty-handed
# This keeps the bitstream recipe from throwing skip errors during parsing
BITSTREAM_PATH = ""
