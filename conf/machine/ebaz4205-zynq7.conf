#@TYPE: Machine
#@NAME: ebaz4205-zynq7
#@DESCRIPTION: Machine support for the EBAZ4205 Zynq-7010 board.

require conf/machine/zynq-generic.conf

# Hardware specs
STAGING_KERNEL_DIR ?= "${TMPDIR}/work-shared/${MACHINE}/kernel-source"

# U-Boot Configurations
UBOOT_MACHINE = "xilinx_zynq_virt_defconfig"
UBOOT_EXTRA_ENV = "board=ebaz4205"

# Device Tree
KERNEL_DEVICETREE = "ebaz4205.dtb"

# SPL and Boot Images
IMAGE_BOOT_FILES = "boot.bin u-boot.img;u-boot.img ebaz4205.dtb"
