#@TYPE: Machine
#@NAME: ebaz4205-zynq7
#@DESCRIPTION: Machine support for the EBAZ4205 Zynq-7010 board.

require conf/machine/zynq-generic.conf

# Hardware specs
STAGING_KERNEL_DIR ?= "${TMPDIR}/work-shared/${MACHINE}/kernel-source"

# U-Boot Configurations
UBOOT_MACHINE = "xilinx_zynq_virt_defconfig"
UBOOT_EXTRA_ENV = "board=ebaz4205"

# Device Tree
KERNEL_DEVICETREE = "ebaz4205.dtb"

# SPL and Boot Images
IMAGE_BOOT_FILES = "boot.bin u-boot.img;u-boot.img ebaz4205.dtb"

# Set the dependency target to match the built-in multiconfig and firmware recipe
do_image[mcdepends] += "mc::fsbl-fw:fsbl-firmware:do_deploy"
FSBL_MCDEPENDS = "mc::fsbl-fw:fsbl-firmware:do_deploy"

# Location of the deployed bootloader binary inside your machine's deploy dir
FSBL_FILE = "${DEPLOY_DIR_IMAGE}/fsbl-firmware-${MACHINE}.elf"

# 1. Clear the virtual/dtb provider to break the dependency loop
PREFERRED_PROVIDER_virtual/dtb = ""

# Satisfy xilinx-bootbin's internal check by giving it a dummy DT file reference
# (Since we compile the DTB directly inside the kernel, this prevents the recipe-skip error)
CONFIG_DTFILE = "${STAGING_KERNEL_DIR}/arch/arm/boot/dts/ebaz4205.dts"
SYSTEM_DTFILE = "${STAGING_KERNEL_DIR}/arch/arm/boot/dts/ebaz4205.dts"

# 1. Completely decouple bitstream variables from the BIF attributes
BIF_PARTITION_ATTR = "fsbl u-boot"

# 2. Force Bitbake to ignore the virtual/bitstream dependency
# This overrides the dynamic replacement code in xilinx-bootbin.bb
DEPENDS:pn-xilinx-bootbin:remove = "virtual/dtb"
DEPENDS:pn-xilinx-bootbin:remove = "virtual/bitstream"
DEPENDS:pn-xilinx-bootbin:remove = "u-boot"
DEPENDS:pn-xilinx-bootbin += "virtual/bootloader"

# 3. Explicitly point the bootbin build variables away from a standalone recipe's build space
CONFIG_DTFILE = ""
SYSTEM_DTFILE = ""

# 4. Tell the bootbin packager to look for the u-boot-xlnx output format (u-boot.elf)
BIF_PARTITION_IMAGE[u-boot] = "${DEPLOY_DIR_IMAGE}/u-boot.elf"

# 5. Explicitly tell the bitstream recipe provider that we are empty-handed
# This keeps the bitstream recipe from throwing skip errors during parsing
BITSTREAM_PATH = ""
