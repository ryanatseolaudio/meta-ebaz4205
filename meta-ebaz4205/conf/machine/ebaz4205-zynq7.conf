#@TYPE: Machine
#@NAME: ebaz4205-zynq7
#@DESCRIPTION: Machine support for the EBAZ4205 Zynq-7000 Board.

require conf/machine/zynq-generic.conf

SERIAL_CONSOLES = "115200;ttyPS0"

# 1. U-Boot & SPL Settings
PREFERRED_PROVIDER_virtual/bootloader = "u-boot-xlnx"
PREFERRED_PROVIDER_u-boot = "u-boot-xlnx"
UBOOT_MACHINE = "xilinx_zynq_virt_defconfig"

# Enable U-Boot SPL generation and tell Yocto to produce BOOT.bin
SPL_BINARY = "spl/boot.bin"
UBOOT_BINARY = "u-boot.img"
UBOOT_IMAGE = "u-boot-${MACHINE}-${PV}-${PR}.img"
UBOOT_SYMLINK = "u-boot.img"

# Generate BOOT.bin from SPL
UBOOT_SIGN_ENABLE = "0"
IMAGE_CLASSES += "uboot-sign"

# 2. Kernel Settings
KERNEL_IMAGETYPE = "uImage"
KERNEL_EXTRA_ARGS += "LOADADDR=0x8000"

# 3. Clean up FSBL dependencies
PREFERRED_PROVIDER_virtual/fsbl = ""
EXTRA_IMAGEDEPENDS:remove = "virtual/fsbl"
EXTRA_IMAGEDEPENDS:remove = "fsbl"

# 4. Boot Artifacts Deployment
IMAGE_BOOT_FILES = "BOOT.bin uImage devicetree.dtb"
