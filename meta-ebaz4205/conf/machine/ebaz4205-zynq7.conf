#@TYPE: Machine
#@NAME: ebaz4205-zynq7
#@DESCRIPTION: Machine support for the EBAZ4205 Zynq Development Board.

# 1. This file automatically sets up the architecture, tune-cortexa9, and SoC settings!
require conf/machine/include/soc-zynq.inc

# 2. Define the SoC family
SOC_FAMILY = "zynq"

# 3. U-Boot configurations (with our override properties to bypass system-top.dtb)
UBOOT_MACHINE = "xilinx_zynq_virt_defconfig"
UBOOT_EXTRA_ENV = "board=ebaz4205"

UBOOT_DTB_NAME = "zynq-zc702.dtb"
UBOOT_DTB_BINARY = "u-boot.dtb"
UBOOT_NODTB_BINARY = "u-boot-nodtb.bin"

EXTRA_OEMAKE:append = " DEVICE_TREE=zynq-zc702"
